<div class="flex justify-center px-4 pt-2 pb-6">
  <div class="w-full max-w-lg">

    <!-- Back link -->
    <div class="flex justify-end mb-4">
      <button
        (click)="cancel()"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
        style="color: #475569; background: #f0f1f2; border: 1px solid #dde1e5;"
      >
        <i class="pi pi-arrow-left" style="font-size: 10px;"></i>
        Back to Clients
      </button>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

      <!-- Card Header -->
      <div class="bg-gradient-to-r from-teal-500 to-teal-700 px-8 py-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
            <i class="pi {{ isEditMode() ? 'pi-pencil' : 'pi-user-plus' }} text-white text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-white">
              {{ isEditMode() ? 'Edit Client' : 'New Client' }}
            </h1>
            <p class="text-indigo-200 text-sm mt-0.5">
              {{ isEditMode() ? 'Update client details' : 'Fill in the details below' }}
            </p>
          </div>
        </div>
      </div>

      <!-- Form Body -->
      <div class="px-8 py-8">

        @if (!ready()) {
          <div class="flex flex-col gap-6">
            @for (i of [1,2,3,4]; track i) {
              <div class="h-14 bg-slate-100 rounded-lg animate-pulse"></div>
            }
          </div>
        }

        @if (ready()) {
          <form (ngSubmit)="submit()" class="flex flex-col gap-6">

            <!-- Reference Number -->
            <p-floatlabel variant="on">
              <input
                pInputText
                id="referenceNumber"
                [(ngModel)]="form.referenceNumber"
                name="referenceNumber"
                class="w-full"
              />
              <label for="referenceNumber">
                <i class="pi pi-hashtag mr-2 text-slate-400"></i>Reference Number
              </label>
            </p-floatlabel>

            <!-- Full Name -->
            <p-floatlabel variant="on">
              <input
                pInputText
                id="fullName"
                [(ngModel)]="form.fullName"
                name="fullName"
                class="w-full"
              />
              <label for="fullName">
                <i class="pi pi-user mr-2 text-slate-400"></i>Full Name
              </label>
            </p-floatlabel>

            <!-- Email -->
            <p-floatlabel variant="on">
              <input
                pInputText
                id="email"
                type="email"
                [(ngModel)]="form.email"
                name="email"
                class="w-full"
              />
              <label for="email">
                <i class="pi pi-envelope mr-2 text-slate-400"></i>Email
              </label>
            </p-floatlabel>

            <!-- Phone -->
            <p-floatlabel variant="on">
              <input
                pInputText
                id="phone"
                [(ngModel)]="form.phone"
                name="phone"
                class="w-full"
              />
              <label for="phone">
                <i class="pi pi-phone mr-2 text-slate-400"></i>Phone
              </label>
            </p-floatlabel>

            <p-divider />

            <!-- Actions -->
            <div class="flex gap-3 justify-end">
              <p-button
                type="button"
                label="Cancel"
                icon="pi pi-times"
                severity="secondary"
                [outlined]="true"
                (onClick)="cancel()"
              />
              <p-button
                type="submit"
                [label]="saving() ? 'Saving...' : (isEditMode() ? 'Update' : 'Create')"
                [icon]="saving() ? 'pi pi-spin pi-spinner' : 'pi pi-check'"
                [disabled]="saving() || !isFormValid"
                styleClass="flex-1"
              />
            </div>

          </form>
        }

      </div>
    </div>

  </div>
</div>
